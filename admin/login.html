<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/static/favicon-32.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <title>登录 · HuTu 管理后台</title>
  <link rel="stylesheet" href="/static/css/common.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <span class="login-logo">🧰</span>
        <h1>HuTu 管理后台</h1>
        <p>请登录后继续</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-row">
          <label for="username">用户名</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="admin">
        </div>
        <div class="form-row">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="密码">
        </div>
        <div id="login-error" class="login-error" hidden></div>
        <button type="submit" class="btn-primary btn-block">登录</button>
      </form>

      <a class="login-back" href="/">← 返回首页</a>
    </div>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
